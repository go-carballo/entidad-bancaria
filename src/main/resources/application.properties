spring.application.name=entidad-bancaria-service
server.port=8080

# --- H2 Database ---
spring.datasource.url=jdbc:h2:mem:bancodb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- H2 Console (accesible en /h2-console) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- RestClient (auto-consumo) ---
app.self.base-url=http://localhost:${server.port}
app.self.connect-timeout=3000
app.self.read-timeout=5000
